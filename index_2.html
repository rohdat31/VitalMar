<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VITALMAR — Tienda VitalHealth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a8a3c;
    --green-light: #2db554;
    --green-dark: #0f5c27;
    --green-glow: rgba(26,138,60,0.18);
    --gold: #d4a017;
    --white: #ffffff;
    --off-white: #f4f8f5;
    --gray-light: #e8f0eb;
    --gray: #9bada0;
    --dark: #0d1a11;
    --card-radius: 18px;
    --shadow: 0 8px 32px rgba(0,0,0,0.13);
    --shadow-hover: 0 18px 48px rgba(0,0,0,0.22);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 68px;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-light);
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo img { height: 38px; }
  .nav-logo span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 3px;
    color: var(--green);
  }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .cart-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--green); color: #fff;
    border: none; border-radius: 40px;
    padding: 10px 20px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: .93rem;
    transition: background .2s, transform .15s;
  }
  .cart-btn:hover { background: var(--green-dark); transform: scale(1.04); }
  .cart-count {
    background: #fff; color: var(--green);
    border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: .78rem; font-weight: 700;
  }

  /* ── HERO ── */
  .hero {
    margin-top: 68px;
    min-height: 340px;
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 55%, #4ade80 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 60px 24px 48px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='28'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
  }
  .hero-tag {
    background: rgba(255,255,255,0.18); color: #fff;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 40px; padding: 5px 18px;
    font-size: .8rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 6vw, 5rem); letter-spacing: 4px;
    color: #fff; line-height: 1; margin-bottom: 14px;
  }
  .hero p { color: rgba(255,255,255,0.88); font-size: 1.05rem; max-width: 480px; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 24px 32px 0; max-width: 1400px; margin: 0 auto;
  }
  .filter-label { font-size: .8rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
  .filter-btn {
    background: #fff; border: 1.5px solid var(--gray-light);
    border-radius: 40px; padding: 7px 18px;
    font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 500;
    cursor: pointer; transition: all .2s; color: var(--dark);
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--green); color: #fff; border-color: var(--green);
  }

  /* ── SEARCH ── */
  .search-wrap {
    padding: 16px 32px 0; max-width: 1400px; margin: 0 auto;
  }
  .search-input {
    width: 100%; max-width: 400px;
    border: 1.5px solid var(--gray-light); border-radius: 40px;
    padding: 10px 22px; font-family: 'DM Sans', sans-serif; font-size: .93rem;
    outline: none; transition: border-color .2s;
    background: #fff;
  }
  .search-input:focus { border-color: var(--green); }

  /* ── GRID ── */
  .catalog-section { padding: 28px 32px 80px; max-width: 1400px; margin: 0 auto; }
  .catalog-section h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 3px; color: var(--green-dark);
    margin-bottom: 24px;
  }
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px;
  }

  /* ── FLIP CARD ── */
  .card-wrap {
    perspective: 1000px;
    height: 360px;
  }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .card-wrap:hover .card-inner,
  .card-wrap.flipped .card-inner {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute; inset: 0;
    border-radius: var(--card-radius);
    backface-visibility: hidden;
    overflow: hidden;
  }

  /* FRONT */
  .card-front {
    background: #fff;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
  }
  .card-front:hover { box-shadow: var(--shadow-hover); }
  .card-img-wrap {
    flex: 1; overflow: hidden; position: relative;
    background: linear-gradient(155deg, #f0faf3, #e8f5ec);
  }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: contain;
    padding: 16px;
    transition: transform .4s ease;
  }
  .card-wrap:hover .card-img-wrap img { transform: scale(1.06); }
  .card-badge {
    position: absolute; top: 12px; right: 12px;
    background: var(--green); color: #fff;
    border-radius: 8px; padding: 3px 10px;
    font-size: .72rem; font-weight: 700; letter-spacing: 1px;
  }
  .card-info {
    padding: 14px 16px 16px;
    border-top: 1px solid var(--gray-light);
  }
  .card-name {
    font-weight: 700; font-size: .95rem; line-height: 1.2;
    color: var(--dark); margin-bottom: 4px;
  }
  .card-sub { font-size: .78rem; color: var(--gray); margin-bottom: 10px; }
  .card-price-row { display: flex; align-items: center; justify-content: space-between; }
  .card-price { font-size: 1.2rem; font-weight: 700; color: var(--green-dark); }
  .card-hint {
    font-size: .72rem; color: var(--gray); display: flex; align-items: center; gap: 4px;
  }
  .flip-icon { font-size: .95rem; }

  /* BACK */
  .card-back {
    background: linear-gradient(160deg, var(--green-dark) 0%, var(--green) 100%);
    transform: rotateY(180deg);
    display: flex; flex-direction: column; padding: 22px 20px 18px;
    color: #fff;
    box-shadow: var(--shadow-hover);
  }
  .back-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,.25); padding-bottom: 10px;
  }
  .benefits-list {
    list-style: none; flex: 1; display: flex; flex-direction: column; gap: 8px;
    overflow: hidden;
  }
  .benefits-list li {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: .83rem; line-height: 1.35; color: rgba(255,255,255,.93);
  }
  .benefit-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,.2); border: 1.5px solid rgba(255,255,255,.5);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; font-size: .65rem;
  }
  .back-price {
    font-size: 1.45rem; font-weight: 700; margin: 12px 0 10px;
    color: #fff;
  }
  .back-actions { display: flex; gap: 8px; }
  .btn-add {
    flex: 1; background: #fff; color: var(--green-dark);
    border: none; border-radius: 40px;
    padding: 10px 12px; font-family: 'DM Sans', sans-serif;
    font-weight: 700; font-size: .82rem; cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .btn-add:hover { transform: scale(1.04); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .btn-wa {
    background: #25D366; color: #fff;
    border: none; border-radius: 40px;
    padding: 10px 14px; font-size: 1rem; cursor: pointer;
    transition: transform .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-wa:hover { transform: scale(1.08); }

  /* ── CART DRAWER ── */
  .cart-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 380px;
    background: #fff; z-index: 201;
    transform: translateX(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    box-shadow: -8px 0 40px rgba(0,0,0,.18);
  }
  .cart-drawer.open { transform: translateX(0); }
  .cart-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 24px; border-bottom: 1px solid var(--gray-light);
  }
  .cart-header h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--green-dark); }
  .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray); }
  .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .cart-empty { text-align: center; color: var(--gray); padding: 60px 0; font-size: .93rem; }
  .cart-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 0; border-bottom: 1px solid var(--gray-light);
  }
  .ci-img {
    width: 56px; height: 56px; border-radius: 10px;
    object-fit: contain; background: var(--off-white); padding: 4px;
    flex-shrink: 0;
  }
  .ci-info { flex: 1; }
  .ci-name { font-weight: 600; font-size: .88rem; }
  .ci-price { color: var(--green); font-weight: 700; font-size: .88rem; }
  .ci-qty { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--gray-light); background: #fff;
    cursor: pointer; font-size: .95rem; display: flex;
    align-items: center; justify-content: center;
    transition: border-color .15s;
  }
  .qty-btn:hover { border-color: var(--green); color: var(--green); }
  .qty-num { font-weight: 600; font-size: .88rem; min-width: 20px; text-align: center; }
  .ci-del { background: none; border: none; color: #e55; cursor: pointer; font-size: 1rem; }
  .cart-footer { padding: 20px 24px; border-top: 1px solid var(--gray-light); }
  .cart-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem; margin-bottom: 16px; }
  .cart-total span:last-child { color: var(--green-dark); }
  .btn-wa-order {
    width: 100%; background: #25D366; color: #fff;
    border: none; border-radius: 40px; padding: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background .2s, transform .15s;
  }
  .btn-wa-order:hover { background: #1ebe5e; transform: scale(1.02); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--green-dark); color: #fff;
    border-radius: 40px; padding: 12px 28px;
    font-weight: 600; font-size: .9rem;
    z-index: 300; opacity: 0; transition: all .35s cubic-bezier(.4,0,.2,1);
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,.18);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FOOTER ── */
  footer {
    background: var(--dark); color: rgba(255,255,255,.55);
    text-align: center; padding: 28px;
    font-size: .82rem; letter-spacing: .5px;
  }
  footer span { color: var(--green-light); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    nav { padding: 0 16px; }
    .catalog-section, .filter-bar, .search-wrap { padding-left: 16px; padding-right: 16px; }
    .cart-drawer { width: 100%; }
    .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
    .card-wrap { height: 300px; }
    .back-name { font-size: 1.1rem; }
    .benefits-list li { font-size: .76rem; }
  }

  /* Loading shimmer */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 800px 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--card-radius);
    height: 360px;
  }
</style>
</head>

// Fallback gradient colors per category
const CAT_COLORS = {
  capsulas: ["#1a5e2e","#2db554"],
  polvo:    ["#1a4a6b","#2e9acc"],
  liquido:  ["#4a1a6b","#9c2ecc"],
  kids:     ["#6b4a1a","#cc9c2e"],
};

let cart = [];
let activeFilter = 'all';
let searchQuery = '';

function getInitials(name) {
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function imgFallback(img, name, cat) {
  const colors = CAT_COLORS[cat] || ["#1a8a3c","#2db554"];
  img.onerror = null;
  img.style.display = 'none';
  const parent = img.parentElement;
  const div = document.createElement('div');
  div.style.cssText = `width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(145deg,${colors[0]},${colors[1]});
    color:rgba(255,255,255,0.9);font-size:2.5rem;font-weight:900;
    font-family:'Bebas Neue',sans-serif;letter-spacing:4px;`;
  div.textContent = getInitials(name);
  parent.appendChild(div);
}

function renderCard(p) {
  const colors = CAT_COLORS[p.cat] || ["#1a8a3c","#2db554"];
  const benefitsHTML = p.benefits.map(b => `
    <li>
      <span class="benefit-dot">✓</span>
      <span>${b}</span>
    </li>`).join('');

  return `
  <div class="card-wrap" id="card-${p.id}">
    <div class="card-inner">
      <!-- FRONT -->
      <div class="card-face card-front">
        <div class="card-img-wrap">
          <img src="${p.img}" alt="${p.name}" loading="lazy"
               onerror="imgFallback(this,'${p.name}','${p.cat}')">
          <span class="card-badge">${p.qty}</span>
        </div>
        <div class="card-info">
          <div class="card-name">${p.name}</div>
          <div class="card-price-row">
            <span class="card-price">S/ ${p.price.toFixed(2)}</span>
            <span class="card-hint"><span class="flip-icon">↻</span> Ver beneficios</span>
          </div>
        </div>
      </div>
      <!-- BACK -->
      <div class="card-face card-back">
        <div class="back-name">${p.name}</div>
        <ul class="benefits-list">${benefitsHTML}</ul>
        <div class="back-price">S/ ${p.price.toFixed(2)}</div>
        <div class="back-actions">
          <button class="btn-add" onclick="event.stopPropagation(); addToCart(${p.id})">+ Agregar</button>
          <button class="btn-wa" onclick="event.stopPropagation(); consultWA('${p.name}',${p.price})" title="WhatsApp">

          </button>
        </div>
      </div>
    </div>
  </div>`;
}

function getFiltered() {
  return PRODUCTS.filter(p => {
    const matchCat = activeFilter === 'all' || p.cat === activeFilter;
    const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
    return matchCat && matchSearch;
  });
}

function renderGrid() {
  const grid = document.getElementById('productsGrid');
  const filtered = getFiltered();
  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--gray);padding:60px 0;">No se encontraron productos 🌿</div>`;
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

function filterProducts(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function searchProducts(q) {
  searchQuery = q;
  renderGrid();
}

/* CART */
function addToCart(id) {
  const p = PRODUCTS.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...p, qty: 1 });
  updateCartUI();
  showToast(`✅ ${p.name} agregado`);
}

function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id);
  updateCartUI();
}

function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id);
  else updateCartUI();
}

function updateCartUI() {
  const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
  document.getElementById('cartCount').textContent = cart.reduce((s,x)=>s+x.qty,0);
  document.getElementById('cartTotal').textContent = `S/ ${total.toFixed(2)}`;
  const itemsEl = document.getElementById('cartItems');
  if (cart.length === 0) {
    itemsEl.innerHTML = `<div class="cart-empty">Tu carrito está vacío 🌿</div>`;
    return;
  }
  itemsEl.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img class="ci-img" src="${item.img}" alt="${item.name}" onerror="this.style.display='none'">
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">S/ ${(item.price * item.qty).toFixed(2)}</div>
        <div class="ci-qty">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
      </div>
      <button class="ci-del" onclick="removeFromCart(${item.id})">🗑</button>
    </div>`).join('');
}

function toggleCart() {
  document.getElementById('cartDrawer').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('open');
}

function orderWhatsApp() {
  if (cart.length === 0) { showToast('⚠️ Tu carrito está vacío'); return; }
  const total = cart.reduce((s,x)=>s+x.price*x.qty,0);
  let msg = '🌿 *Pedido VitalHealth*\n\n';
  cart.forEach(item => {
    msg += `▪ ${item.name} x${item.qty} — S/ ${(item.price*item.qty).toFixed(2)}\n`;
  });
  msg += `\n💰 *Total: S/ ${total.toFixed(2)}*\n\n¡Hola! Quiero confirmar este pedido.`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

function consultWA(name, price) {
  const msg = `🌿 Hola! Me interesa el producto *${name}* (S/ ${price.toFixed(2)}). ¿Podrías darme más información?`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// Init
renderGrid();
</script>
